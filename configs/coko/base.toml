[project]
name = "anima-slam-coko"
codename = "SLAM-COKO"
functional_name = "Compact Keyframe-Optimized Multi-Agent Gaussian Splatting SLAM"
wave = 7
paper_title = "Compact Keyframe-Optimized Multi-Agent Gaussian Splatting SLAM"
paper_arxiv = "2604.00804"
reference_repo = "https://github.com/lemonci/coko-slam"

[compute]
backend = "auto"
precision = "fp32"

[runtime]
mode = "rendered_depth"
multi_gpu = false

[data]
shared_volume = "/Volumes/AIFlowDev/RobotFlowLabs/datasets"
repos_volume = "/Volumes/AIFlowDev/RobotFlowLabs/repos/wave7"
dataset = "replica"
scene = "office_0"
agent_ids = [0, 1]

[mapping]
new_submap_every = 50
map_every = 5
iterations = 50
new_submap_iterations = 1000
new_submap_points_num = 60000
new_submap_gradient_points_num = 5000
alpha_threshold = 0.6
pruning_threshold = 0.1
active_compaction = true
prune_ratio = 0.05
init_rho = 0.0005
compaction_start = 0.7
compaction_end = 0.95

[tracking]
w_color_loss = 0.95
iterations = 60
cam_rot_lr = 0.0002
cam_trans_lr = 0.002
odometry_type = "odometer"
odometer_method = "point_to_plane"
filter_outlier_depth = true
alpha_threshold = 0.98
soft_alpha = true
mask_invalid_depth = false

[loop_detection]
feature_extractor_name = "dino"
weights_path = "./dinov2-small"
embed_size = 384
feature_dist_threshold = 0.1
device = "cpu"
time_threshold = 0
max_loops_per_frame = 1
fitness_threshold = 0.35
inlier_rmse_threshold = 0.1

[camera]
height = 680
width = 1200
fx = 600.0
fy = 600.0
cx = 599.5
cy = 339.5
depth_scale = 6553.5

[keyframing]
active = true
threshold = 0.02

[submapping]
active = true
threshold = 0.05
keyframe_num = 10

[submap]
anchor_data = "render_depth"
initial_transformation_unknown = true
pgo_backend = "gtsam"
